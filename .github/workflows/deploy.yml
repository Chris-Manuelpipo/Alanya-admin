name: Deploy alanya-admin

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/alanya-admin
            git pull origin main
            npm ci
            NEXT_PUBLIC_API_URL=http://158.220.107.211/api npm run build
            pm2 restart alanya-admin